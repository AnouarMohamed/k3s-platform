# Application-Specific ServiceAccounts
# Following the Principle of Least Privilege, each application has its own identity.
# This prevents a compromise in one app from granting access to another app's secrets or API.

# SECURITY RATIONALE: 'automountServiceAccountToken: false'
# By default, Kubernetes mounts a token in every pod that allows it to talk to the API server.
# Most applications do not need this. Disabling it significantly reduces the blast radius
# of a compromised pod by preventing it from performing unauthorized API operations.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: wordpress-db
  namespace: apps
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wordpress-demo
  namespace: apps
automountServiceAccountToken: false
