    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-passbolt-db
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: create-backup-user
              image: mariadb:10.11.18@sha256:5a5c675881ef3fd1c1da9b0a3bfd6ee82edbe39cd9e32e06be18034c37235e0e
              command: ["/bin/sh", "-ec"]
              args:
                - |
                  escaped_password="$(printf '%s' "${PASSBOLT_BACKUP_PASSWORD}" | sed "s/'/''/g")"
