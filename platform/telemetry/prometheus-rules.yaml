apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: ops
data:
  platform.rules.yaml: |
    groups:
      - name: platform-health
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Prometheus target is down
              description: Target {{ $labels.job }} in namespace {{ $labels.namespace }} has been down for more than 2 minutes.

          - alert: KubePodCrashLooping
            expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Pod is crash looping
              description: Pod {{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is in CrashLoopBackOff.

          - alert: KubeDeploymentReplicasMismatch
            expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Deployment replicas are unavailable
              description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has fewer available replicas than desired.

          - alert: KubePersistentVolumeClaimPending
            expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: PVC is pending
              description: PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been pending for more than 10 minutes.

          - alert: NodeRootDiskLow
            expr: node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} < 0.15
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Node root disk is low
              description: Node {{ $labels.instance }} has less than 15% free space on the root filesystem.

      - name: backup-health
        rules:
          - alert: BackupJobFailed
            expr: kube_job_status_failed{namespace="apps", job_name=~"backup-.*"} > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Backup job failed
              description: Backup job {{ $labels.namespace }}/{{ $labels.job_name }} has failed.

          - alert: BackupCronJobHasNeverSucceeded
            expr: kube_cronjob_info{namespace="apps", cronjob=~"backup-.*"} unless on(namespace, cronjob) kube_cronjob_status_last_successful_time{namespace="apps", cronjob=~"backup-.*"}
            for: 26h
            labels:
              severity: critical
            annotations:
              summary: Backup CronJob has not recorded a success
              description: Backup CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} has no recorded successful run.

          - alert: BackupCronJobStale
            expr: time() - max by (namespace, cronjob) (kube_cronjob_status_last_successful_time{namespace="apps", cronjob=~"backup-.*"}) > 93600
            for: 30m
            labels:
              severity: critical
            annotations:
              summary: Backup CronJob is stale
              description: Backup CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} has not succeeded in the last 26 hours.

          - alert: BackupCronJobSuspended
            expr: kube_cronjob_spec_suspend{namespace="apps", cronjob=~"backup-.*"} != 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Backup CronJob is suspended
              description: Backup CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} is suspended.
