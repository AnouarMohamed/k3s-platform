# NetworkPolicy: Application-to-Database Ingress
# Purpose: permit only specific application and backup pods in apps to reach their matching DB pods in data.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wordpress-to-wordpress-db
  namespace: data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wordpress-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              app.kubernetes.io/name: wordpress-demo
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              app.kubernetes.io/name: backup-wordpress-db
      ports:
        - protocol: TCP
          port: 3306
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-passbolt-to-passbolt-db
  namespace: data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: passbolt-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              app.kubernetes.io/name: passbolt
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              app.kubernetes.io/name: backup-passbolt-db
      ports:
        - protocol: TCP
          port: 3306
