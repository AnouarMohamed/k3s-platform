# NetworkPolicy: Ingress Permissions
# Purpose: Allows external traffic via the NGINX Ingress Controller to reach application pods.
# Flow: Internet -> Ingress Controller (ingress-nginx namespace) -> App Pod (apps namespace)
# Permissions: Restricted to specific destination ports and source namespace.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-wordpress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wordpress-demo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
