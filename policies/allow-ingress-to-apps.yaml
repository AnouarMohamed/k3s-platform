---
# Special permission for Jenkins Agents to connect to the Jenkins Controller.
# This allows pods with label jenkins.io/agent: "true" from 'apps' or 'ops' namespaces.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-jenkins-agents
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              jenkins.io/agent: "true"
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ops
          podSelector:
            matchLabels:
              jenkins.io/agent: "true"
      ports:
        - protocol: TCP
          port: 50000
---
