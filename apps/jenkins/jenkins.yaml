apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-home
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: apps
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jenkins
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: jenkins
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      # securityContext: Jenkins requires specific UID/GID for file permissions.
      # runAsUser: 1000 - Executes as the 'jenkins' user defined in the image.
      # fsGroup: 1000 - Ensures persistent volumes are writable by the jenkins user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jenkins
          image: jenkins/jenkins:2.555.3-lts-jdk21@sha256:e82bbdcffb6361c081ac66bbdcd5802a299b3631c78c3be04a0a91c7f952fff3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50000
              name: agent
          # resources: Jenkins is JVM-based; requests/limits are set to prevent heap-related OOM.
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: home
              mountPath: /var/jenkins_home
          # readinessProbe: Checks if the login page is accessible (Java/Jenkins initialized).
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          # livenessProbe: Restarts Jenkins if the web UI becomes unresponsive.
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: jenkins-home
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: agent
      port: 50000
      targetPort: agent
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/whitelist-source-range: 203.0.113.10/32
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jenkins.example.com
      secretName: jenkins-tls
  rules:
    - host: jenkins.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jenkins
                port:
                  name: http
