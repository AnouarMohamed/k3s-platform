apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-content
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-db
  namespace: data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-db
  namespace: data
  labels:
    app.kubernetes.io/name: wordpress-db
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wordpress-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordpress-db
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: wordpress-db
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: mysql:8.4.9@sha256:c36050afdca850f23cef85703f84c7531a5ae155a11b5ee1c60acb09937c4084
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: MYSQL_DATABASE
              value: wordpress
            - name: MYSQL_USER
              value: wordpress
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: WORDPRESS_DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wordpress-db
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-db
  namespace: data
spec:
  selector:
    app.kubernetes.io/name: wordpress-db
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-demo
  namespace: apps
  labels:
    app.kubernetes.io/name: wordpress-demo
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: wordpress-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wordpress-demo
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: wordpress-demo
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wordpress
          image: bitnami/wordpress@sha256:334da5f84fe3cf1636c4aa5827fff5f2d2906b1c7e5db1d05586566755c09f2f
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: WORDPRESS_DATABASE_HOST
              value: wordpress-db.data.svc.cluster.local
            - name: WORDPRESS_DATABASE_PORT_NUMBER
              value: "3306"
            - name: WORDPRESS_DATABASE_USER
              value: wordpress
            - name: WORDPRESS_DATABASE_NAME
              value: wordpress
            - name: WORDPRESS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: WORDPRESS_DB_PASSWORD
            - name: WORDPRESS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: WORDPRESS_ADMIN_USERNAME
            - name: WORDPRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: WORDPRESS_ADMIN_PASSWORD
            - name: WORDPRESS_EMAIL
              valueFrom:
                secretKeyRef:
                  name: wordpress-demo-secret
                  key: WORDPRESS_ADMIN_EMAIL
          volumeMounts:
            - name: content
              mountPath: /bitnami/wordpress
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: wordpress-content
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-demo
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: wordpress-demo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-demo
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-body-size: "128m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wp.example.com
      secretName: wordpress-demo-tls
  rules:
    - host: wp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress-demo
                port:
                  name: http
