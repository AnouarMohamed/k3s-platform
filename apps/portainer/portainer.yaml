apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portainer-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: apps
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: portainer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portainer
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: portainer
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portainer
          image: portainer/portainer-ce:2.39.3-alpine@sha256:90ae993781c08a4dcd1f96c6547a072bb3f90b7ebd5e082d071ef1ad8a341373
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --admin-password-file
            - /run/secrets/PORTAINER_ADMIN_PASSWORD_HASH
          ports:
            - containerPort: 9000
              name: http
          # resources: Portainer is lightweight; limits are set to ensure minimal footprint.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: portainer-secret
              mountPath: /run/secrets
              readOnly: true
          # readinessProbe: Verifies the Portainer UI is responding.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          # livenessProbe: Restarts Portainer if the service becomes unresponsive.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portainer-data
        - name: portainer-secret
          secret:
            secretName: portainer-secret
---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: portainer
  ports:
    - name: http
      port: 9000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portainer
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/whitelist-source-range: 203.0.113.10/32
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - portainer.example.com
      secretName: portainer-tls
  rules:
    - host: portainer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portainer
                port:
                  name: http
