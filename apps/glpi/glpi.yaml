apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glpi-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: apps
  labels:
    app.kubernetes.io/name: glpi
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glpi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glpi
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      containers:
        - name: glpi
          image: elestio/glpi:latest
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/www/html
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: glpi-data
---
apiVersion: v1
kind: Service
metadata:
  name: glpi
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: glpi
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glpi
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - glpi.lab.example.com
      secretName: glpi-tls
  rules:
    - host: glpi.lab.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glpi
                port:
                  name: http
