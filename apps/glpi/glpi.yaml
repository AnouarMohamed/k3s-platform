apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glpi-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glpi
  namespace: apps
  labels:
    app.kubernetes.io/name: glpi
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: glpi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glpi
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: glpi
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: glpi
          image: glpi/glpi:11.0.7@sha256:e87765bb99a99ea5f30979ea2e5b2d8aa2c48beb8ab36eb127e5fef44148c41b
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 80
              name: http
          # resources: Defines standard allocation for a PHP/Web application.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/www/html
            - name: tmp
              mountPath: /tmp
          # readinessProbe: Ensures GLPI is serving the login page/dashboard.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          # livenessProbe: Restarts GLPI if the web service hangs.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: glpi-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: glpi
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: glpi
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glpi
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/whitelist-source-range: 203.0.113.10/32
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - glpi.example.com
      secretName: glpi-tls
  rules:
    - host: glpi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glpi
                port:
                  name: http
