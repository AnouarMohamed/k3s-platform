apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: superset-home
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: apps
  labels:
    app.kubernetes.io/name: superset
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: superset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: superset
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: superset
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: superset
          image: apache/superset:5.0.0@sha256:09735adaae3945c5a8fabbeca31a7954c8c74de195702ba61622aee8604d5c55
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - |
              superset db upgrade &&
              superset fab create-admin \
                --username "${SUPERSET_ADMIN_USERNAME}" \
                --firstname "${SUPERSET_ADMIN_FIRSTNAME}" \
                --lastname "${SUPERSET_ADMIN_LASTNAME}" \
                --email "${SUPERSET_ADMIN_EMAIL}" \
                --password "${SUPERSET_ADMIN_PASSWORD}" || true
              superset init
              gunicorn --bind 0.0.0.0:8088 "superset.app:create_app()"
          ports:
            - containerPort: 8088
              name: http
          # resources: Superset (Python/Gunicorn) requires significant memory for data processing.
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_SECRET_KEY
            - name: SUPERSET_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_ADMIN_USERNAME
            - name: SUPERSET_ADMIN_FIRSTNAME
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_ADMIN_FIRSTNAME
            - name: SUPERSET_ADMIN_LASTNAME
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_ADMIN_LASTNAME
            - name: SUPERSET_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_ADMIN_EMAIL
            - name: SUPERSET_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_ADMIN_PASSWORD
            - name: SUPERSET_HOME
              value: /app/superset_home
          volumeMounts:
            - name: home
              mountPath: /app/superset_home
          # readinessProbe: Verifies the Superset health endpoint is reachable.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          # livenessProbe: Restarts the container if Superset becomes unresponsive.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: superset-home
---
apiVersion: v1
kind: Service
metadata:
  name: superset
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: superset
  ports:
    - name: http
      port: 8088
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/whitelist-source-range: 203.0.113.10/32
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bi.example.com
      secretName: superset-tls
  rules:
    - host: bi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset
                port:
                  name: http
