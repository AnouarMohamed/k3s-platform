apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: superset-home
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: apps
  labels:
    app.kubernetes.io/name: superset
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: superset
  template:
    metadata:
      labels:
        app.kubernetes.io/name: superset
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      containers:
        - name: superset
          image: apache/superset:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              superset db upgrade &&
              superset fab create-admin \
                --username "${SUPERSET_ADMIN_USERNAME:-admin}" \
                --firstname Admin \
                --lastname User \
                --email "${SUPERSET_ADMIN_EMAIL:-admin@example.com}" \
                --password "${SUPERSET_ADMIN_PASSWORD:-change-me}" || true
              superset init
              gunicorn --bind 0.0.0.0:8088 "superset.app:create_app()"
          ports:
            - containerPort: 8088
              name: http
          env:
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: SUPERSET_SECRET_KEY
            - name: SUPERSET_HOME
              value: /app/superset_home
          volumeMounts:
            - name: home
              mountPath: /app/superset_home
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: superset-home
---
apiVersion: v1
kind: Service
metadata:
  name: superset
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: superset
  ports:
    - name: http
      port: 8088
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bi.lab.example.com
      secretName: superset-tls
  rules:
    - host: bi.lab.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset
                port:
                  name: http
