apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: passbolt-db
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: passbolt-db
  namespace: apps
  labels:
    app.kubernetes.io/name: passbolt-db
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: passbolt-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: passbolt-db
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: passbolt-db
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: mariadb:10.11.18@sha256:5a5c675881ef3fd1c1da9b0a3bfd6ee82edbe39cd9e32e06be18034c37235e0e
          # allowPrivilegeEscalation: false - Prevents root-level exploits within the container.
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3306
              name: mysql
          # resources: Moderate allocation for MariaDB in a password manager setup.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: MYSQL_DATABASE
              value: passbolt
            - name: MYSQL_USER
              value: passbolt
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: passbolt-secret
                  key: PASSBOLT_DB_PASSWORD
            - name: MYSQL_RANDOM_ROOT_PASSWORD
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          # readinessProbe: Uses MariaDB's healthcheck script to ensure the engine is ready.
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
          # livenessProbe: Restarts the DB if the connection or InnoDB fails.
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: passbolt-db
---
apiVersion: v1
kind: Service
metadata:
  name: passbolt-db
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: passbolt-db
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: passbolt-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-retain
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: passbolt
  namespace: apps
  labels:
    app.kubernetes.io/name: passbolt
    app.kubernetes.io/part-of: ito-k3s-platform
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: passbolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: passbolt
        app.kubernetes.io/part-of: ito-k3s-platform
    spec:
      serviceAccountName: passbolt
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: passbolt
          image: passbolt/passbolt:5.13.0-1-ce@sha256:4b0d76c786bfca78b0362b7a24f1f6d55cb25c0333bd9beffd52ab3b5b829d37
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 80
              name: http
          # resources: Passbolt (PHP/Nginx) requires consistent memory for encryption tasks.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: APP_FULL_BASE_URL
              value: https://passbolt.example.com
            - name: DATASOURCES_DEFAULT_HOST
              value: passbolt-db.apps.svc.cluster.local
            - name: DATASOURCES_DEFAULT_DATABASE
              value: passbolt
            - name: DATASOURCES_DEFAULT_USERNAME
              value: passbolt
            - name: DATASOURCES_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: passbolt-secret
                  key: PASSBOLT_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /etc/passbolt
          # readinessProbe: Checks Passbolt's internal healthcheck JSON endpoint.
          readinessProbe:
            httpGet:
              path: /healthcheck/status.json
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          # livenessProbe: Restarts the container if the Passbolt service becomes unhealthy.
          livenessProbe:
            httpGet:
              path: /healthcheck/status.json
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: passbolt-data
---
apiVersion: v1
kind: Service
metadata:
  name: passbolt
  namespace: apps
spec:
  selector:
    app.kubernetes.io/name: passbolt
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: passbolt
  namespace: apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - passbolt.example.com
      secretName: passbolt-tls
  rules:
    - host: passbolt.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: passbolt
                port:
                  name: http
