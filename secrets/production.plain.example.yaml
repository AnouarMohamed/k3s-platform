apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secret
  namespace: ops
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: platform-webhook
      group_by:
        - alertname
        - namespace
        - job
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: platform-webhook
          matchers:
            - severity="critical"
          repeat_interval: 1h

    receivers:
      - name: platform-webhook
        webhook_configs:
          - url: https://hooks.example.com/platform-alerts
            send_resolved: true
