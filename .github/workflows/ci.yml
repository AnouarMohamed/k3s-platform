name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Render Kustomize tree
        run: kubectl kustomize . > /dev/null

      - name: Check manifests
        run: ./scripts/check-manifests.sh
